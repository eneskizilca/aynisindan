version: '3.8'

services:
  # ───────── PostgreSQL ─────────
  postgres:
    image: postgres:15-alpine
    container_name: aynisindan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_DB: aynisindan_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME} -d aynisindan_core" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ───────── MongoDB ─────────
  mongo:
    image: mongo:6.0
    container_name: aynisindan-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  # ───────── Spring Boot Backend ─────────
  backend:
    image: 669403677178.dkr.ecr.eu-central-1.amazonaws.com/aynisindan-backend:latest
    container_name: aynisindan-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aynisindan_core
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      GEMINI_API_KEY: ${GEMINI_API_KEY_ENV}
      GOOGLE_AI_MODEL_NAME: ${GOOGLE_AI_MODEL_NAME}
      AI_PROVIDER: ${AI_PROVIDER}
      FAL_API_KEY: ${FAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # ───────── Next.js Frontend ─────────
  frontend:
    image: 669403677178.dkr.ecr.eu-central-1.amazonaws.com/aynisindan-frontend:latest
    container_name: aynisindan-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://18.192.48.116:8080/api/v1
      NEXT_PUBLIC_CATALOG_API_URL: http://18.192.48.116:8081/api/v1
    depends_on:
      - backend
    networks:
      - app-network

  # ───────── Go Chat & Catalog Service ─────────
  chat-catalog-service:
    image: 669403677178.dkr.ecr.eu-central-1.amazonaws.com/aynisindan-chat-catalog:latest
    container_name: aynisindan-chat-catalog
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      MONGO_URI: mongodb://mongo:27017/aynisindan
      PORT: 8081
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongo
    networks:
      app-network:
        aliases:
          - chat-service
          - catalog-service

  # ───────── Prometheus ─────────
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: aynisindan-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app-network

  # ───────── Grafana ─────────
  grafana:
    image: grafana/grafana:10.0.3
    container_name: aynisindan-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infrastructure/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./infrastructure/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - app-network
    depends_on:
      - prometheus

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:

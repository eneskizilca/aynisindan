services:
  # ───────── PostgreSQL ─────────
  postgres:
    image: postgres:15-alpine
    container_name: aynisindan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: aynisindan_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d aynisindan_core" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ───────── MongoDB (Golang Servisleri İçin) ─────────
  mongo:
    image: mongo:6.0
    container_name: aynisindan-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # ───────── Spring Boot Backend ─────────
  backend:
    build:
      context: ./services/core-service
      dockerfile: Dockerfile
    container_name: aynisindan-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aynisindan_core
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_AI_MODEL_NAME: ${GOOGLE_AI_MODEL_NAME}
      AI_PROVIDER: ${AI_PROVIDER}
      FAL_API_KEY: ${FAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  # ───────── Next.js Frontend ─────────
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: aynisindan-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_CATALOG_API_URL: http://localhost:8081/api/v1
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev
    depends_on:
      - backend

  # ───────── Go Chat & Catalog Service ─────────
  chat-catalog-service:
    build:
      context: ./services/chat-catalog-service
      dockerfile: Dockerfile
    container_name: aynisindan-chat-catalog
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      MONGO_URI: mongodb://mongo:27017/aynisindan
      PORT: 8081
      JWT_SECRET: aynisindanplatformusecretkeyformjwttokengenerationmustbelongenough
    depends_on:
      - mongo

volumes:
  postgres_data:
  mongo_data: